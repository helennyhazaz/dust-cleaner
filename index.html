<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנקה לכלוכי פילטר</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; padding: 30px 20px; }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.95rem; }
  .upload-zone {
    border: 2px dashed #444; border-radius: 16px; padding: 50px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; background: #1a1a1a;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: #4a9eff; background: #1a2a3a; }
  .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
  .upload-zone p { color: #aaa; }
  .upload-zone span { color: #4a9eff; font-weight: 600; }
  #fileInput { display: none; }
  .controls {
    background: #1a1a1a; border-radius: 12px; padding: 20px 24px;
    margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-group label { font-size: 0.85rem; color: #aaa; }
  .ctrl-group input[type=range] { width: 150px; accent-color: #4a9eff; }
  .ctrl-group .val { font-size: 0.85rem; color: #4a9eff; font-weight: 600; text-align: center; }
  .btn { padding: 12px 28px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #4a9eff; color: #fff; }
  .btn-primary:hover { background: #2a7edf; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-dl { background: #1a4a1a; color: #8f8; border: 1px solid #2a6a2a; padding: 8px 18px; font-size: 0.9rem; }
  .btn-dl:hover { background: #2a5a2a; }
  .progress-bar { height: 6px; background: #222; border-radius: 4px; margin-bottom: 20px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4a9eff, #8a5eff); transition: width 0.15s; }
  .stats { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }
  .stats span { color: #4a9eff; font-weight: 600; }
  .result-card { background: #1a1a1a; border-radius: 14px; padding: 16px; margin-bottom: 20px; }
  .result-card h3 { font-size: 0.95rem; color: #ccc; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { border-radius: 20px; padding: 2px 10px; font-size: 0.78rem; font-weight: 600; }
  .badge-red { background: #e55; color: #fff; }
  .badge-green { background: #5a5; color: #fff; }
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .compare-side { display: flex; flex-direction: column; gap: 6px; }
  .compare-side span { font-size: 0.78rem; color: #888; text-align: center; }
  .compare-side canvas { width: 100%; border-radius: 8px; cursor: zoom-in; }
  .dl-row { display: flex; justify-content: flex-end; margin-top: 12px; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
  .lightbox .close { position: absolute; top: 20px; right: 24px; font-size: 2rem; cursor: pointer; color: #fff; background: none; border: none; }
  @media (max-width: 600px) { .compare { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<h1>🔍 מנקה לכלוכי פילטר / עדשה</h1>
<p class="subtitle">מזהה נקודות אבק על הסנסור ומוחק אותן אוטומטית</p>

<div class="upload-zone" id="uploadZone">
  <div class="icon">📷</div>
  <p>גרור תמונות לכאן או <span>לחץ לבחירה</span></p>
  <p style="font-size:0.8rem; margin-top:8px; color:#666;">JPG, PNG — עד 50 תמונות</p>
</div>
<input type="file" id="fileInput" multiple accept="image/*">

<div class="controls">
  <div class="ctrl-group">
    <label>רגישות זיהוי</label>
    <input type="range" id="sensitivity" min="1" max="20" value="8">
    <div class="val" id="sensitivityVal">8</div>
  </div>
  <div class="ctrl-group">
    <label>רדיוס טשטוש השוואה</label>
    <input type="range" id="blurR" min="10" max="80" value="30">
    <div class="val" id="blurRVal">30px</div>
  </div>
  <div class="ctrl-group">
    <label>הרחבת ניקוי</label>
    <input type="range" id="expand" min="0" max="15" value="4">
    <div class="val" id="expandVal">4px</div>
  </div>
  <button class="btn btn-primary" id="processBtn" disabled>✨ נקה לכלוכים</button>
</div>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<div class="stats" id="statsEl"></div>
<div id="results"></div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">✕</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
const processBtn = document.getElementById('processBtn');
const progressBar  = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const statsEl    = document.getElementById('statsEl');
const resultsEl  = document.getElementById('results');
const lightbox   = document.getElementById('lightbox');
const lbImg      = document.getElementById('lbImg');
let files = [];

[['sensitivity',''],['blurR','px'],['expand','px']].forEach(([id,unit]) => {
  const el = document.getElementById(id), vl = document.getElementById(id+'Val');
  el.addEventListener('input', () => vl.textContent = el.value + unit);
});

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); addFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', () => addFiles(Array.from(fileInput.files)));

function addFiles(f) {
  files = f.filter(x => x.type.startsWith('image/')).slice(0, 50);
  processBtn.disabled = files.length === 0;
  statsEl.innerHTML = files.length > 0 ? `נטענו <span>${files.length}</span> תמונות` : '';
  resultsEl.innerHTML = '';
}

processBtn.addEventListener('click', async () => {
  processBtn.disabled = true;
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';
  resultsEl.innerHTML = '';
  const sensitivity = parseInt(document.getElementById('sensitivity').value);
  const blurR       = parseInt(document.getElementById('blurR').value);
  const expand      = parseInt(document.getElementById('expand').value);
  for (let i = 0; i < files.length; i++) {
    progressFill.style.width = ((i+1)/files.length*100) + '%';
    statsEl.innerHTML = `מעבד <span>${i+1}</span> מתוך <span>${files.length}</span>...`;
    const card = await processFile(files[i], sensitivity, blurR, expand);
    resultsEl.appendChild(card);
    await new Promise(r => setTimeout(r, 0));
  }
  statsEl.innerHTML = `✅ הושלם! עובד על <span>${files.length}</span> תמונות`;
  progressBar.style.display = 'none';
  processBtn.disabled = false;
});

function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

async function processFile(file, sensitivity, blurR, expand) {
  const img = await loadImage(file);
  const W = img.width, H = img.height;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const origData = ctx.getImageData(0, 0, W, H);
  const orig = origData.data;

  // Step 1: Large blur for DETECTION only
  statsEl.innerHTML = `מזהה לכלוך... ${file.name}`;
  await new Promise(r => setTimeout(r, 0));
  const blurredDetect = boxBlur(orig, W, H, blurR);

  // Step 2: Build dust mask
  const mask = new Uint8Array(W * H);
  let spotCount = 0;
  for (let i = 0; i < W * H; i++) {
    const oi = i * 4;
    const gOrig  = (orig[oi]*77    + orig[oi+1]*150    + orig[oi+2]*29)    >> 8;
    const gBlur  = (blurredDetect[oi]*77 + blurredDetect[oi+1]*150 + blurredDetect[oi+2]*29) >> 8;
    if (gBlur - gOrig > sensitivity) { mask[i] = 1; spotCount++; }
  }

  // Step 3: Dilate mask
  const dilated = dilateMask(mask, W, H, expand);

  // Step 4: Small blur (radius 4) for HEALING — sharp enough to not look blurry
  const blurredHeal = boxBlur(orig, W, H, 4);

  // Step 5: Heal — replace masked pixels with small-blur value (feathered)
  const cleaned = new Uint8ClampedArray(orig);
  for (let i = 0; i < W * H; i++) {
    if (!dilated[i]) continue;
    const oi = i * 4;
    const alpha = mask[i] ? 1.0 : 0.6;
    cleaned[oi]   = Math.round(orig[oi]   * (1-alpha) + blurredHeal[oi]   * alpha);
    cleaned[oi+1] = Math.round(orig[oi+1] * (1-alpha) + blurredHeal[oi+1] * alpha);
    cleaned[oi+2] = Math.round(orig[oi+2] * (1-alpha) + blurredHeal[oi+2] * alpha);
  }

  // Build display
  const scale = Math.min(1, 900/W);
  const dW = Math.round(W*scale), dH = Math.round(H*scale);

  // Before
  const beforeC = document.createElement('canvas');
  beforeC.width = dW; beforeC.height = dH;
  const bCtx = beforeC.getContext('2d');
  bCtx.putImageData(origData, 0, 0);
  // We need to scale — draw to temp then copy
  const tmpB = document.createElement('canvas');
  tmpB.width = dW; tmpB.height = dH;
  tmpB.getContext('2d').drawImage(canvas, 0, 0, dW, dH);
  bCtx.clearRect(0,0,dW,dH);
  bCtx.drawImage(tmpB, 0, 0);
  // Highlight mask
  bCtx.fillStyle = 'rgba(255,50,50,0.35)';
  // Draw mask as overlay (scale down)
  for (let py = 0; py < dH; py++) {
    for (let px = 0; px < dW; px++) {
      const sx = Math.round(px/scale), sy = Math.round(py/scale);
      if (sx < W && sy < H && dilated[sy*W+sx]) {
        bCtx.fillRect(px, py, 1, 1);
      }
    }
  }

  // After
  const afterC = document.createElement('canvas');
  afterC.width = dW; afterC.height = dH;
  const aCtx = afterC.getContext('2d');
  ctx.putImageData(new ImageData(cleaned, W, H), 0, 0);
  aCtx.drawImage(canvas, 0, 0, dW, dH);

  // Download blob
  const dlBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
  const dlURL  = URL.createObjectURL(dlBlob);

  // Card
  const badge = spotCount === 0
    ? `<span class="badge badge-green">✅ נקי</span>`
    : `<span class="badge badge-red">${spotCount} פיקסלים נוקו</span>`;

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `<h3>📄 ${file.name} ${badge}</h3>
    <div class="compare">
      <div class="compare-side"><span>לפני — אזורי לכלוך מודגשים באדום</span></div>
      <div class="compare-side"><span>אחרי — לאחר ניקוי</span></div>
    </div>
    <div class="dl-row"></div>`;

  const sides = card.querySelectorAll('.compare-side');
  sides[0].appendChild(beforeC);
  sides[1].appendChild(afterC);

  beforeC.addEventListener('click', () => { lbImg.src = beforeC.toDataURL(); lightbox.classList.add('open'); });
  afterC.addEventListener('click',  () => { lbImg.src = afterC.toDataURL();  lightbox.classList.add('open'); });

  const dlBtn = document.createElement('button');
  dlBtn.className = 'btn btn-dl';
  dlBtn.textContent = '💾 הורד מנוקה';
  dlBtn.addEventListener('click', () => {
    const a = document.createElement('a'); a.href = dlURL;
    a.download = 'cleaned_' + file.name.replace(/\.[^.]+$/, '') + '.jpg';
    a.click();
  });
  card.querySelector('.dl-row').appendChild(dlBtn);
  return card;
}

// Fast separable box blur
function boxBlur(src, W, H, r) {
  const passes = 3; // 3 box blur passes ≈ Gaussian
  let buf = new Float32Array(W * H * 4);
  for (let i = 0; i < src.length; i++) buf[i] = src[i];

  for (let p = 0; p < passes; p++) {
    buf = blurH(buf, W, H, r);
    buf = blurV(buf, W, H, r);
  }

  const out = new Uint8ClampedArray(W * H * 4);
  for (let i = 0; i < out.length; i++) out[i] = buf[i];
  return out;
}

function blurH(src, W, H, r) {
  const dst = new Float32Array(src.length);
  const inv = 1 / (2*r+1);
  for (let y = 0; y < H; y++) {
    for (let c = 0; c < 4; c++) {
      let sum = 0;
      for (let x = -r; x <= r; x++) sum += src[(y*W + Math.max(0,Math.min(W-1,x)))*4+c];
      for (let x = 0; x < W; x++) {
        dst[(y*W+x)*4+c] = sum * inv;
        const add = Math.min(W-1, x+r+1), rem = Math.max(0, x-r);
        sum += src[(y*W+add)*4+c] - src[(y*W+rem)*4+c];
      }
    }
  }
  return dst;
}

function blurV(src, W, H, r) {
  const dst = new Float32Array(src.length);
  const inv = 1 / (2*r+1);
  for (let x = 0; x < W; x++) {
    for (let c = 0; c < 4; c++) {
      let sum = 0;
      for (let y = -r; y <= r; y++) sum += src[(Math.max(0,Math.min(H-1,y))*W+x)*4+c];
      for (let y = 0; y < H; y++) {
        dst[(y*W+x)*4+c] = sum * inv;
        const add = Math.min(H-1, y+r+1), rem = Math.max(0, y-r);
        sum += src[(add*W+x)*4+c] - src[(rem*W+x)*4+c];
      }
    }
  }
  return dst;
}

function dilateMask(mask, W, H, r) {
  if (r <= 0) return mask;
  const out = new Uint8Array(W * H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (mask[y*W+x]) {
        for (let dy = -r; dy <= r; dy++)
          for (let dx = -r; dx <= r; dx++) {
            const nx=x+dx, ny=y+dy;
            if (nx>=0&&nx<W&&ny>=0&&ny<H) out[ny*W+nx]=1;
          }
      }
    }
  }
  return out;
}

document.getElementById('lbClose').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
</script>
</body>
</html>
